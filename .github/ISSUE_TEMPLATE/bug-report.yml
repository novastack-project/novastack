name: "\U0001F41B Bug Report"
description: Report a bug in Novastack
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us investigate and fix the issue.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm before submitting
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have read the documentation
          required: true
        - label: I am using the latest version of Novastack
          required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe what happened?, what you expected, and what actually happened
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide minimal code to reproduce the issue
      render: python
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      description: Include relevant error messages or stack traces
      render: shell
    validations:
      required: false

  - type: textarea
    id: system-info
    attributes:
      label: Environment
      description: Please provide your environment details
      value: |
        - OS: 
        - Python version: 
        - Novastack version: 
    validations:
      required: true
      