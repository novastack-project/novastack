name: "✨ Feature Request"
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much detail as possible to help us understand your request.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm before submitting
      options:
        - label: I have searched existing issues and discussions
          required: true
        - label: This feature does not exist in the latest version
          required: true

  - type: textarea
    id: proposed-feature
    attributes:
      label: Proposed Feature
      description: Describe the feature you'd like to see
      placeholder: |
        I would like NovaStack to support...
        This could work by...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe your specific use case and how this feature would benefit you and others
      placeholder: |
        In my project, I need to...
        This would help users who...
    validations:
      required: false

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: If you have technical suggestions for implementation, share them here
      placeholder: |
        This could be implemented by...
        Potential API design:
        ```python
        # Example code
        ```
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Low - Nice to have
        - Medium - Would significantly improve my workflow
        - High - Blocking my use case
    validations:
      required: false
