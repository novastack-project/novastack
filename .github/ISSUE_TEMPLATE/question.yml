name: "❓ Question"
description: Ask a question about NovaStack
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're here to help!

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and discussions
          required: true
        - label: I have read the documentation
          required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: |
        How do I...?
        What is the best way to...?
        Can NovaStack support...?
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Code Example (if applicable)
      description: Share relevant code snippets
      render: python
    validations:
      required: false
