name: Testing

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-telemetry:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies for novastack-telemetry
        working-directory: ./novastack-telemetry
        run: uv sync --extra dev

      - name: Run tests for novastack-telemetry
        working-directory: ./novastack-telemetry
        run: uv run pytest -v --tb=short

  test-utils:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies for novastack-utils
        working-directory: ./novastack-utils
        run: uv sync --extra dev

      - name: Run tests for novastack-utils
        working-directory: ./novastack-utils
        run: uv run pytest -v --tb=short

