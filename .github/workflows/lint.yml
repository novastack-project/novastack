name: Linting

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.11
      
      - name: Install dependencies (dev)
        run: uv sync --locked --extra dev

      - name: Run linter
        shell: bash
        run: uv run ruff check .
